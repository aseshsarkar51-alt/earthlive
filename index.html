<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarthLive — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--bg2:#ede8dc;--bg3:#e6e0d2;--surface:#fff;--surface2:#faf7f2;--border:#d4cec2;--border-dark:#b8b0a0;--text:#1a1612;--text2:#4a4540;--text3:#8a847a;--text4:#b0aaa0;--accent:#1a1612;--accent-inv:#f5f0e8;--nav-bg:rgba(245,240,232,.96);--danger:#c0392b;--success:#27ae60;--warning:#e67e22;--bubble-me:#1a1612;--bubble-them:#fff;--bubble-me-text:#f5f0e8;--bubble-them-text:#1a1612}
[data-theme="bw"]{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--border-dark:#3a3a3a;--text:#f0f0f0;--text2:#c0c0c0;--text3:#888;--text4:#555;--accent:#f0f0f0;--accent-inv:#0a0a0a;--nav-bg:rgba(10,10,10,.97);--bubble-me:#f0f0f0;--bubble-them:#1e1e1e;--bubble-me-text:#0a0a0a;--bubble-them-text:#f0f0f0}
[data-theme="white"]{--bg:#fff;--bg2:#f8f8f8;--bg3:#f0f0f0;--surface:#fff;--surface2:#fafafa;--border:#e5e5e5;--border-dark:#ccc;--text:#111;--text2:#444;--text3:#888;--text4:#bbb;--accent:#111;--accent-inv:#fff;--nav-bg:rgba(255,255,255,.97);--bubble-me:#111;--bubble-them:#f0f0f0;--bubble-me-text:#fff;--bubble-them-text:#111}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;cursor:none;transition:background .3s,color .3s}
.cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cursor-ring{width:32px;height:32px;border:1px solid rgba(26,22,18,.35);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes typingDot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}

/* ── THEME ── */
.theme-dots{position:fixed;bottom:1.5rem;left:1.5rem;z-index:99999;display:flex;gap:4px}
.th-btn{width:9px;height:9px;border-radius:2px;cursor:pointer;border:none;outline:none;transition:transform .2s,box-shadow .2s}
.th-btn:hover{transform:scale(1.5)}
.th-btn.active{box-shadow:0 0 0 2px #fff,0 0 0 3px #555;transform:scale(1.2)}
.th-warm{background:#c8b89a}.th-bw{background:#222}.th-white{background:#fff;border:1px solid #bbb}

/* ══════════════════
   LAYOUT — FULL SCREEN
══════════════════ */
.app{display:grid;grid-template-columns:72px 320px 1fr;height:100vh;overflow:hidden}

/* ── ICON RAIL ── */
.rail{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:.8rem 0;gap:.25rem;z-index:10}
.rail-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:var(--text);writing-mode:vertical-rl;transform:rotate(180deg);padding:.5rem 0;margin-bottom:.5rem;cursor:pointer}
.rail-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 1.5s infinite;margin-bottom:.5rem}
.rail-btn{width:44px;height:44px;border-radius:10px;border:none;background:transparent;color:var(--text3);font-size:1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative}
.rail-btn:hover{background:var(--bg3);color:var(--text)}
.rail-btn.active{background:var(--accent);color:var(--accent-inv)}
.rail-badge{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:#c0392b;color:#fff;font-family:'Space Mono',monospace;font-size:.32rem;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.rail-spacer{flex:1}
.rail-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--accent-inv);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;cursor:pointer;border:2px solid var(--border-dark);margin-top:.5rem}

/* ── INBOX SIDEBAR ── */
.inbox{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.inbox-header{padding:.9rem 1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0}
.inbox-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.inbox-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em;color:var(--text)}
.inbox-actions{display:flex;gap:.3rem}
.ia-btn{width:30px;height:30px;border-radius:6px;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s}
.ia-btn:hover{background:var(--bg2);color:var(--text)}
.inbox-search{display:flex;align-items:center;gap:.4rem;background:var(--bg2);border:1px solid var(--border);padding:.38rem .65rem;transition:border-color .2s;border-radius:6px}
.inbox-search:focus-within{border-color:var(--accent)}
.inbox-search input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Mono',monospace;font-size:.52rem;width:100%}
.inbox-search input::placeholder{color:var(--text4)}
.inbox-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.itab{flex:1;font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);background:transparent;border:none;border-bottom:2px solid transparent;padding:.6rem 0;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.35rem}
.itab:hover{color:var(--text)}
.itab.active{color:var(--text);border-bottom-color:var(--accent)}
.itab-badge{background:var(--accent);color:var(--accent-inv);border-radius:8px;padding:.05rem .32rem;font-size:.34rem;animation:pulse 2s infinite}
.inbox-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.inbox-list::-webkit-scrollbar{width:3px}
.inbox-list::-webkit-scrollbar-thumb{background:var(--bg3)}

/* Conversation row */
.conv-row{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;cursor:pointer;transition:background .15s;position:relative;border-bottom:1px solid var(--border)}
.conv-row:hover{background:var(--surface2)}
.conv-row.active{background:var(--bg2)}
.conv-row.unread{background:var(--surface2)}
.conv-av-wrap{position:relative;flex-shrink:0}
.conv-av{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px solid var(--border-dark);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--text);overflow:hidden}
.conv-av.group{border-radius:12px}
.conv-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--success);border:2px solid var(--surface)}
.conv-av-stack{position:relative;width:44px;height:44px;flex-shrink:0}
.conv-av-a{position:absolute;width:32px;height:32px;border-radius:50%;background:var(--bg3);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.52rem;font-weight:700;color:var(--text);top:0;left:0;z-index:2}
.conv-av-b{position:absolute;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.44rem;font-weight:700;color:var(--text);bottom:0;right:0;z-index:1}
.conv-av-c{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--bg3);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.36rem;font-weight:700;color:var(--text);bottom:0;left:12px;z-index:0}
.conv-body{flex:1;min-width:0}
.conv-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.15rem}
.conv-name{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.conv-time{font-family:'Space Mono',monospace;font-size:.38rem;color:var(--text4);flex-shrink:0}
.conv-preview{font-size:.75rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.conv-preview.unread-preview{color:var(--text2);font-weight:500}
.conv-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
.conv-typing-preview{display:flex;align-items:center;gap:.3rem;font-family:'Space Mono',monospace;font-size:.42rem;color:var(--success);font-style:italic}
.conv-typing-dots{display:flex;gap:2px}
.typing-dot-sm{width:3px;height:3px;border-radius:50%;background:var(--success);animation:typingDot .9s infinite}
.typing-dot-sm:nth-child(2){animation-delay:.15s}
.typing-dot-sm:nth-child(3){animation-delay:.3s}
.conv-request-badge{font-family:'Space Mono',monospace;font-size:.34rem;letter-spacing:.1em;text-transform:uppercase;background:rgba(230,126,34,.1);color:var(--warning);border:1px solid rgba(230,126,34,.3);padding:.1rem .38rem;border-radius:8px;margin-top:.15rem;display:inline-block}
.conv-muted-icon{font-size:.7rem;color:var(--text4)}
.conv-pinned-icon{font-size:.62rem;color:var(--warning)}
.new-convo-btn{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);background:var(--surface2)}
.new-convo-btn:hover{background:var(--bg2)}
.ncb-icon{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--accent-inv);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ncb-text{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}

/* ── CHAT PANEL ── */
.chat-panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;padding:2rem}
.chat-empty-icon{font-size:3rem;opacity:.35}
.chat-empty-text{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;color:var(--text);opacity:.35;text-align:center;line-height:1.1}
.chat-empty-sub{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);text-align:center}

/* Chat header */
.chat-header{display:flex;align-items:center;gap:.8rem;padding:.75rem 1.2rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:5}
.ch-av-wrap{position:relative;flex-shrink:0;cursor:pointer}
.ch-av{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:2px solid var(--border-dark);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;color:var(--text);overflow:hidden}
.ch-av.group{border-radius:10px}
.ch-online{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--success);border:2px solid var(--surface)}
.ch-body{flex:1;min-width:0}
.ch-name{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.06em;color:var(--text);display:flex;align-items:center;gap:.5rem}
.ch-status{font-family:'Space Mono',monospace;font-size:.4rem;color:var(--text4);margin-top:.1rem}
.ch-status.typing{color:var(--success);display:flex;align-items:center;gap:.35rem}
.ch-actions{display:flex;gap:.2rem;flex-shrink:0}
.cha-btn{width:34px;height:34px;border-radius:8px;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
.cha-btn:hover{background:var(--bg2);color:var(--text)}
.cha-btn.active{background:var(--bg3);color:var(--accent)}

/* Message request banner */
.msg-request-banner{background:rgba(230,126,34,.06);border-bottom:1px solid rgba(230,126,34,.2);padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;flex-shrink:0}
.mrb-text{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--warning);letter-spacing:.08em;line-height:1.7}
.mrb-actions{display:flex;gap:.5rem}
.mrb-btn{font-family:'Space Mono',monospace;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .8rem;cursor:pointer;border-radius:3px;transition:all .2s}
.mrb-accept{background:var(--success);color:#fff;border:1px solid var(--success)}
.mrb-accept:hover{background:transparent;color:var(--success)}
.mrb-decline{background:transparent;color:var(--danger);border:1px solid rgba(192,57,43,.35)}
.mrb-decline:hover{background:rgba(192,57,43,.06);border-color:var(--danger)}

/* Group info banner */
.group-info-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.group-info-bar::-webkit-scrollbar{display:none}
.gib-av{width:24px;height:24px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border-dark);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.42rem;font-weight:700;color:var(--text);flex-shrink:0}
.gib-name{font-family:'Space Mono',monospace;font-size:.4rem;color:var(--text3);white-space:nowrap}

/* Messages body */
.chat-body{flex:1;overflow-y:auto;padding:1rem 1.4rem;display:flex;flex-direction:column;gap:.3rem;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{background:var(--bg3)}

/* Date divider */
.date-divider{display:flex;align-items:center;gap:.8rem;margin:.6rem 0}
.date-divider-line{flex:1;height:1px;background:var(--border)}
.date-divider-txt{font-family:'Space Mono',monospace;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);white-space:nowrap}

/* Message bubble */
.msg-row{display:flex;align-items:flex-end;gap:.5rem;animation:fadeIn .2s ease;position:relative}
.msg-row.me{flex-direction:row-reverse}
.msg-row.me .msg-av{display:none}
.msg-row + .msg-row.same-sender{margin-top:1px}
.msg-row + .msg-row.same-sender .msg-av{opacity:0;pointer-events:none}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-dark);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.44rem;font-weight:700;color:var(--text);flex-shrink:0;align-self:flex-end}
.msg-content{max-width:68%;display:flex;flex-direction:column}
.msg-row.me .msg-content{align-items:flex-end}
.msg-sender-name{font-family:'Space Mono',monospace;font-size:.38rem;color:var(--text4);margin-bottom:.2rem;padding:0 .6rem}
.bubble{padding:.6rem .9rem;border-radius:16px;font-size:.84rem;line-height:1.58;font-family:'DM Sans',sans-serif;position:relative;word-break:break-word}
.bubble.them{background:var(--bubble-them);color:var(--bubble-them-text);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
.bubble.me{background:var(--bubble-me);color:var(--bubble-me-text);border-radius:16px 16px 4px 16px}
.bubble.them.group-first{border-radius:4px 16px 16px 4px}
.msg-meta{display:flex;align-items:center;gap:.3rem;margin-top:.2rem;padding:0 .2rem}
.msg-time{font-family:'Space Mono',monospace;font-size:.32rem;color:var(--text4)}
.msg-time.me{text-align:right}
/* Read receipts */
.read-receipt{font-size:.52rem;color:var(--text4);line-height:1}
.read-receipt.sent{color:var(--text4)}
.read-receipt.delivered{color:var(--text3)}
.read-receipt.read{color:var(--accent)}
.read-receipt.me-theme{color:rgba(245,240,232,.5)}
.read-receipt.read.me-theme{color:rgba(245,240,232,.9)}

/* Typing indicator bubble */
.typing-bubble{display:flex;align-items:center;gap:.4rem;padding:.65rem .9rem;background:var(--bubble-them);border:1px solid var(--border);border-radius:16px 16px 16px 4px;width:fit-content;animation:fadeIn .2s ease}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typingDot .9s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
.typing-label{font-family:'Space Mono',monospace;font-size:.38rem;color:var(--text4);margin-left:.1rem}

/* Reactions */
.bubble-wrap{position:relative;display:inline-flex;flex-direction:column}
.msg-row.me .bubble-wrap{align-items:flex-end}
.reactions-bar{display:flex;flex-wrap:wrap;gap:2px;margin-top:.2rem;padding:0 .2rem}
.reaction-chip{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.08rem .4rem;cursor:pointer;transition:all .2s;font-size:.7rem}
.reaction-chip:hover{border-color:var(--accent);transform:scale(1.1)}
.reaction-chip.mine{border-color:var(--accent);background:var(--bg2)}
.reaction-chip-count{font-family:'Space Mono',monospace;font-size:.34rem;color:var(--text3)}
/* Reaction picker */
.reaction-picker{position:absolute;z-index:200;background:var(--surface);border:1px solid var(--border-dark);border-radius:20px;padding:.35rem .5rem;display:flex;gap:.15rem;box-shadow:0 8px 24px rgba(26,22,18,.18);display:none;bottom:calc(100% + 4px);left:0;animation:popIn .15s ease}
.msg-row.me .reaction-picker{left:auto;right:0}
.reaction-picker.show{display:flex}
.rp-emoji{font-size:1.2rem;cursor:pointer;padding:.15rem .2rem;border-radius:8px;transition:transform .15s,background .15s;border:none;background:transparent}
.rp-emoji:hover{transform:scale(1.35);background:var(--bg2)}
/* Hover actions */
.bubble-wrap:hover .msg-hover-actions{opacity:1}
.msg-hover-actions{position:absolute;top:50%;transform:translateY(-50%);display:flex;gap:2px;opacity:0;transition:opacity .15s;z-index:10}
.msg-row:not(.me) .msg-hover-actions{right:-64px}
.msg-row.me .msg-hover-actions{left:-64px;flex-direction:row-reverse}
.mha-btn{width:24px;height:24px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .15s}
.mha-btn:hover{background:var(--bg2);color:var(--accent);border-color:var(--accent)}

/* Media messages */
.media-bubble{max-width:240px;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border)}
.media-bubble img{width:100%;display:block;filter:brightness(.9);transition:filter .3s}
.media-bubble:hover img{filter:brightness(1)}
.media-bubble-overlay{position:absolute;inset:0;background:rgba(26,22,18,.35);display:flex;align-items:center;justify-content:center;font-size:1.8rem;opacity:0;transition:opacity .3s}
.media-bubble:hover .media-bubble-overlay{opacity:1}
.file-bubble{display:flex;align-items:center;gap:.7rem;background:var(--bubble-them);border:1px solid var(--border);border-radius:12px;padding:.7rem .9rem;cursor:pointer;transition:border-color .2s;max-width:220px}
.file-bubble:hover{border-color:var(--accent)}
.file-icon{font-size:1.5rem;flex-shrink:0}
.file-info{min-width:0}
.file-name{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-family:'Space Mono',monospace;font-size:.36rem;color:var(--text4);margin-top:.1rem}
.voice-bubble{display:flex;align-items:center;gap:.6rem;background:var(--bubble-them);border:1px solid var(--border);border-radius:24px;padding:.5rem .9rem;min-width:160px;max-width:220px}
.voice-play{width:28px;height:28px;border-radius:50%;background:var(--accent);color:var(--accent-inv);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:transform .15s}
.voice-play:hover{transform:scale(1.1)}
.voice-waveform{flex:1;display:flex;align-items:center;gap:2px;height:20px}
.wf-bar{background:var(--text3);border-radius:2px;width:3px;transition:background .2s}
.voice-duration{font-family:'Space Mono',monospace;font-size:.36rem;color:var(--text4);flex-shrink:0}

/* Link preview in chat */

.composer{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:.6rem .9rem .7rem;display:flex;flex-direction:column;gap:.4rem}

.composer-row{display:flex;align-items:flex-end;gap:.5rem}
.composer-tools{display:flex;gap:.15rem}
.ct-btn{width:32px;height:32px;border-radius:8px;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;flex-shrink:0;position:relative}

.composer-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;line-height:1.55;resize:none;max-height:100px;overflow-y:auto}

.send-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--accent-inv);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .25s;flex-shrink:0}

.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Group info panel */
.group-info-panel{position:absolute;right:0;top:0;bottom:0;width:300px;background:var(--surface);border-left:1px solid var(--border);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}

};

var activeConvId=null;

/* ══════════════
   HELPERS
══════════════ */
function showToast(msg){var t=document.getElementById('global-toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function getConv(id){return CONVERSATIONS.find(function(c){return c.id===id;});}
function getPerson(id){return PEOPLE[id]||{id:id,name:id,handle:'@'+id,av:id.substring(0,2).toUpperCase(),online:false};}
function getConvName(conv){
  if(conv.type==='group')return conv.name;
  var p=getPerson(conv.participants[0]);return p.name;
}
function getConvAv(conv){
  if(conv.type==='group')return null;
  return getPerson(conv.participants[0]).av;
}
function getLastMsg(conv){var msgs=conv.messages;return msgs.length?msgs[msgs.length-1]:null;}
function fmtPreview(msg){
  if(!msg)return'';
  if(msg.type==='image')return'📷 Photo';
  if(msg.type==='file')return'📄 '+msg.fileName;
  if(msg.type==='voice')return'🎤 Voice message';
  if(msg.type==='link')return'🔗 '+msg.text;
  return msg.text.substring(0,60);
}
function getTotalUnread(){return CONVERSATIONS.filter(function(c){return!c.isRequest;}).reduce(function(s,c){return s+(c.unread||0);},0);}
function getRequestCount(){return CONVERSATIONS.filter(function(c){return c.isRequest;}).length;}

/* ══════════════
   INBOX RENDER
══════════════ */
function setInboxTab(tab,btn){
  inboxTab=tab;
  document.querySelectorAll('.itab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderInbox();
}
function filterInbox(q){renderInbox(q);}
function renderInbox(q){
  var list=document.getElementById('inbox-list');
  var convs=CONVERSATIONS.filter(function(c){
    if(inboxTab==='groups'&&c.type!=='group')return false;
    if(inboxTab==='requests'&&!c.isRequest)return false;
    if(inboxTab==='all'&&c.isRequest)return false;
    if(q){var name=getConvName(c).toLowerCase();return name.includes(q.toLowerCase());}
    return true;
  });
  /* Sort: pinned first, then by last message time (simulated) */
  convs.sort(function(a,b){if(a.pinned&&!b.pinned)return-1;if(!a.pinned&&b.pinned)return 1;return(b.messages.length)-(a.messages.length);});
  list.innerHTML=convs.map(function(c){return buildConvRow(c);}).join('');
  /* Update badges */
  var totalUnread=getTotalUnread();
  var rb=document.getElementById('rail-msg-badge');if(rb)rb.textContent=totalUnread;if(rb)rb.style.display=totalUnread?'flex':'none';
  var uac=document.getElementById('unread-all-ct');if(uac){uac.textContent=totalUnread;uac.style.display=totalUnread?'inline':'none';}
  var rqc=document.getElementById('req-ct');if(rqc){var rn=getRequestCount();rqc.textContent=rn;rqc.style.display=rn?'inline':'none';}
}
function buildConvRow(c){
  var lastMsg=getLastMsg(c);
  var name=getConvName(c);
  var isActive=c.id===activeConvId;
  var isTyping=typingTimers[c.id];
  var avHtml='';
  if(c.type==='group'){
    var pp=c.participants.slice(0,3).map(function(id){return getPerson(id);});
    avHtml='<div class="conv-av-stack">';
    if(pp[0])avHtml+='<div class="conv-av-a">'+pp[0].av+'</div>';
    if(pp[1])avHtml+='<div class="conv-av-b">'+pp[1].av+'</div>';
    if(pp[2])avHtml+='<div class="conv-av-c">'+pp[2].av+'</div>';
    avHtml+='</div>';
  } else {
    var p=getPerson(c.participants[0]);
    avHtml='<div class="conv-av-wrap"><div class="conv-av">'+p.av+'</div>'+(p.online?'<div class="conv-online"></div>':'')+'</div>';
  }
  var previewHtml='';
  if(isTyping){
    previewHtml='<div class="conv-typing-preview"><div class="conv-typing-dots"><div class="typing-dot-sm"></div><div class="typing-dot-sm"></div><div class="typing-dot-sm"></div></div>typing…</div>';
  } else if(lastMsg){
    var txt=(lastMsg.from==='me'?'You: ':'')+fmtPreview(lastMsg);
    previewHtml='<div class="conv-preview'+(c.unread?' unread-preview':'')+'">'+txt+'</div>';
  }
  if(c.isRequest)previewHtml+='<div class="conv-request-badge">Message Request</div>';
  return'<div class="conv-row'+(isActive?' active':'')+(c.unread?' unread':'')+'" id="cr-'+c.id+'" onclick="openConversation(\''+c.id+'\')">'+
    avHtml+
    '<div class="conv-body">'+
    '<div class="conv-name-row"><div class="conv-name">'+
    (c.pinned?'<span class="conv-pinned-icon">📌</span> ':'')+
    (c.muted?'<span class="conv-muted-icon">🔇</span> ':'')+
    name+'</div>'+
    '<div style="display:flex;align-items:center;gap:.35rem">'+
    (c.unread?'<div class="conv-unread-dot"></div>':'')+
    '<div class="conv-time">'+(lastMsg?lastMsg.time:'')+'</div>'+
    '</div></div>'+
    previewHtml+
    '</div></div>';
}

/* ══════════════
   OPEN CONVERSATION
══════════════ */
function openConversation(id){
  activeConvId=id;
  var conv=getConv(id);if(!conv)return;
  conv.unread=0;
  /* Update inbox row active state */
  document.querySelectorAll('.conv-row').forEach(function(r){r.classList.remove('active');});
  var row=document.getElementById('cr-'+id);if(row)row.classList.add('active');
  row&&row.querySelector('.conv-unread-dot')&&row.querySelector('.conv-unread-dot').remove();
  renderInbox();
  renderChat(conv);
}

/* ══════════════
   CHAT RENDER
══════════════ */
function renderChat(conv){
  var panel=document.getElementById('chat-panel');
  var p=conv.type==='dm'?getPerson(conv.participants[0]):null;
  var name=getConvName(conv);
  var isOnline=p&&p.online;
  var isRequest=conv.isRequest;

  /* Header */
  var avHtml='';
  if(conv.type==='group'){
    var pp=conv.participants.slice(0,2).map(function(id){return getPerson(id);});
    avHtml='<div class="conv-av-stack" style="width:40px;height:40px;flex-shrink:0">'+(pp[0]?'<div class="conv-av-a" style="width:28px;height:28px;font-size:.5rem">'+pp[0].av+'</div>':'')+(pp[1]?'<div class="conv-av-b" style="width:24px;height:24px;font-size:.42rem">'+pp[1].av+'</div>':'')+'</div>';
  } else {
    avHtml='<div class="ch-av-wrap" onclick="'+(conv.type==='group'?'toggleGroupInfo()':'')+'"><div class="ch-av">'+p.av+'</div>'+(isOnline?'<div class="ch-online"></div>':'')+'</div>';
  }
  var statusHtml=typingTimers[conv.id]?
    '<div class="ch-status typing"><div style="display:flex;gap:2px"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:.15s"></div><div class="typing-dot" style="animation-delay:.3s"></div></div>typing…</div>':
    '<div class="ch-status">'+(conv.type==='group'?conv.participants.length+1+' members':(isOnline?'Online now':'Last seen recently'))+'</div>';

  /* Group info bar */
  var groupBar='';
  if(conv.type==='group'){
    var allMembers=[ME].concat(conv.participants.map(getPerson));
    groupBar='<div class="group-info-bar">'+allMembers.map(function(m){return'<div style="display:flex;flex-direction:column;align-items:center;gap:.2rem;flex-shrink:0"><div class="gib-av">'+m.av+'</div><div class="gib-name">'+m.name.split(' ')[0]+'</div></div>';}).join('')+'</div>';
  }

  /* Request banner */
  var requestBanner=isRequest?'<div class="msg-request-banner"><div class="mrb-text"><strong>'+(p?p.name:name)+'</strong> wants to send you a message.<br>They don\'t follow you. Accept to start chatting.</div><div class="mrb-actions"><button class="mrb-btn mrb-accept" onclick="acceptMsgRequest(\''+conv.id+'\')">✓ Accept</button><button class="mrb-btn mrb-decline" onclick="declineMsgRequest(\''+conv.id+'\')">✕ Decline</button></div></div>':'';

  panel.innerHTML=
    '<div class="chat-header">'+avHtml+
    '<div class="ch-body"><div class="ch-name">'+name+(p&&p.online?'':'')+' '+(conv.muted?'<span style="font-size:.65rem;color:var(--text4)">🔇</span>':'')+'</div>'+statusHtml+'</div>'+
    '<div class="ch-actions">'+
    (conv.type==='group'?'<button class="cha-btn" title="Group Info" onclick="toggleGroupInfo()">ℹ</button>':'')+
    '<button class="cha-btn'+(conv.muted?' active':'')+'" title="'+(conv.muted?'Unmute':'Mute')+'" onclick="toggleMuteConv(\''+conv.id+'\')">'+(conv.muted?'🔊':'🔇')+'</button>'+
    '<button class="cha-btn'+(conv.pinned?' active':'')+'" title="'+(conv.pinned?'Unpin':'Pin')+'" onclick="togglePinConv(\''+conv.id+'\')">'+(conv.pinned?'📌':'📌')+'</button>'+
    '<button class="cha-btn" title="Search in chat">⌕</button>'+
    '<button class="cha-btn" title="More" onclick="showConvMenu(\''+conv.id+'\')">⋯</button>'+
    '</div></div>'+
    requestBanner+
    groupBar+
    '<div class="chat-body" id="chat-body">'+buildMessages(conv)+'</div>'+
    (isRequest?'':'<div class="composer" id="chat-composer" style="position:relative">'+buildComposer(conv)+'</div>')+
    buildGroupInfoPanel(conv);

  scrollToBottom();
  simulateTyping(conv);

  /* Group info panel state */
  groupInfoOpen=false;
}

function buildMessages(conv){
  var html='';
  var prevFrom=null,prevDate=null;
  conv.messages.forEach(function(msg,i){
    var isMe=msg.from==='me';
    var sameSender=prevFrom===msg.from;
    var p=isMe?ME:getPerson(msg.from);
    /* Date divider */
    if(msg.time!==prevDate&&(msg.time.includes('AM')||msg.time.includes('PM')||msg.time==='Yesterday'||msg.time==='Mon'||msg.time==='Sun'||msg.time.includes('Fri')||msg.time.includes('Thu'))){
      if(!sameSender||(msg.time!==prevDate)){
        if(['Yesterday','Mon','Sun','Fri','Thu'].includes(msg.time)&&msg.time!==prevDate){
          html+='<div class="date-divider"><div class="date-divider-line"></div><div class="date-divider-txt">'+msg.time+'</div><div class="date-divider-line"></div></div>';
          prevDate=msg.time;
        }
      }
    }
    /* Sender name in groups */
    var senderLabel=(!isMe&&conv.type==='group'&&!sameSender)?'<div class="msg-sender-name">'+p.name+'</div>':'';
    /* Build bubble content */
    var bubbleContent='';
    if(msg.replyTo){var rt=conv.messages.find(function(m){return m.id===msg.replyTo;});if(rt){bubbleContent+='<div class="reply-preview"><div class="reply-preview-name">'+(rt.from==='me'?'You':getPerson(rt.from).name)+'</div><div class="reply-preview-text">'+fmtPreview(rt)+'</div></div>';}}
    if(msg.forwarded)bubbleContent='<div class="forwarded-label">↪ Forwarded</div>'+bubbleContent;
    if(msg.type==='image'){
      bubbleContent='<div class="media-bubble" onclick="openLightbox(\''+msg.img+'\')"><img src="'+msg.img+'" loading="lazy"><div class="media-bubble-overlay">🔍</div></div>';
    } else if(msg.type==='file'){
      bubbleContent='<div class="file-bubble" onclick="showToast(\'Downloading '+msg.fileName+'…\')"><div class="file-icon">'+msg.fileIcon+'</div><div class="file-info"><div class="file-name">'+msg.fileName+'</div><div class="file-size">'+msg.fileSize+'</div></div></div>';
    } else if(msg.type==='voice'){
      var bars=Array.from({length:20},function(){return'<div class="wf-bar" style="height:'+Math.round(Math.random()*14+4)+'px"></div>';}).join('');
      bubbleContent='<div class="voice-bubble"><button class="voice-play" onclick="showToast(\'Playing voice message…\')">▶</button><div class="voice-waveform">'+bars+'</div><span class="voice-duration">0:'+Math.floor(Math.random()*50+10)+'</span></div>';
    } else {
      if(msg.text)bubbleContent+='<div class="bubble '+(isMe?'me':'them')+(!isMe&&conv.type==='group'&&!sameSender?' group-first':'')+'">'+escHtml(msg.text)+'</div>';
      if(msg.linkPreview){var lp=msg.linkPreview;bubbleContent+='<div class="chat-link-preview" onclick="window.open(\''+lp.url+'\',\'_blank\')"><div class="clp-img">'+lp.emoji+'</div><div class="clp-body"><div class="clp-domain">'+lp.domain+'</div><div class="clp-title">'+lp.title+'</div></div></div>';}
    }
    /* Reactions */
    var reactionsHtml='';
    var rxKeys=Object.keys(msg.reactions||{});
    if(rxKeys.length){reactionsHtml='<div class="reactions-bar">'+rxKeys.map(function(emoji){var users=msg.reactions[emoji];var mine=users.includes('me');return'<div class="reaction-chip'+(mine?' mine':'')+'" onclick="toggleReaction(\''+conv.id+'\',\''+msg.id+'\',\''+emoji+'\')">'+emoji+'<span class="reaction-chip-count">'+users.length+'</span></div>';}).join('')+'</div>';}
    /* Read receipt */
    var receiptHtml='';
    if(isMe){var status=msg.status||'sent';var icon={sent:'✓',delivered:'✓✓',read:'✓✓'}[status]||'✓';var cls=status==='read'?'read':'sent';receiptHtml='<span class="read-receipt me-theme '+cls+'">'+icon+'</span>';}

    /* Hover actions */
    var hoverActions='<div class="msg-hover-actions">'+
      '<button class="mha-btn" title="React" onclick="toggleReactionPicker(\'rp-'+msg.id+'\',event)">😊</button>'+
      '<button class="mha-btn" title="Reply" onclick="setReplyTo(\''+conv.id+'\',\''+msg.id+'\')">↩</button>'+
      (isMe?'<button class="mha-btn" title="Unsend" onclick="unsendMsg(\''+conv.id+'\',\''+msg.id+'\')">🗑</button>':'<button class="mha-btn" title="Forward" onclick="forwardMsg(\''+conv.id+'\',\''+msg.id+'\')">↪</button>')+
    '</div>';
    var reactionPicker='<div class="reaction-picker" id="rp-'+msg.id+'">'+QUICK_REACTIONS.map(function(e){return'<button class="rp-emoji" onclick="toggleReaction(\''+conv.id+'\',\''+msg.id+'\',\''+e+'\')" title="'+e+'">'+e+'</button>';}).join('')+'</div>';

    html+='<div class="msg-row'+(isMe?' me':'')+(sameSender?' same-sender':'')+'" id="msg-'+msg.id+'">'+
      (!isMe?'<div class="msg-av">'+p.av+'</div>':'')+
      '<div class="msg-content">'+
      senderLabel+
      '<div class="bubble-wrap">'+
      reactionPicker+hoverActions+
      bubbleContent+
      reactionsHtml+
      '</div>'+
      '<div class="msg-meta">'+
      '<span class="msg-time'+(isMe?' me':'')+'">'+msg.time+'</span>'+
      receiptHtml+
      '</div></div></div>';
    prevFrom=msg.from;
  });
  /* Typing indicator */
  if(typingTimers[conv.id]){
    html+='<div class="msg-row" id="typing-row"><div class="msg-av">'+getPerson(conv.participants[0]).av+'</div><div class="msg-content"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-label">typing…</span></div></div>';
  }
  return html;
}

  return'<div id="reply-bar" style="display:none"></div>'+
    '<div id="media-preview-bar" class="composer-media-preview" style="display:none"></div>'+

    '<div class="composer-tools">'+
    '<button class="ct-btn" title="Emoji" onclick="toggleEmojiPicker()">😄</button>'+

    '</div>'+
    '</div></div>';

/* ══════════════
   SEND / ACTIONS
══════════════ */
function onComposerInput(ta){
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';
  var btn=document.getElementById('send-btn');if(btn)btn.disabled=!ta.value.trim()&&!composerMedia.length;
  simulatePartnerTyping();
}
function handleComposerKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

function sendMessage(){
  var conv=getConv(activeConvId);if(!conv)return;
  var ta=document.getElementById('msg-input');
  var text=(ta?ta.value.trim():'');
  if(!text&&!composerMedia.length)return;

  /* Media messages */
  if(composerMedia.length){
    composerMedia.forEach(function(src){
      var newMsg={id:'m'+Date.now()+Math.random(),from:'me',type:'image',img:src,text:'',time:nowTime(),reactions:{},readBy:[],status:'sent',replyTo:replyingTo};
      conv.messages.push(newMsg);
    });
    composerMedia=[];
    var pb=document.getElementById('media-preview-bar');if(pb){pb.innerHTML='';pb.style.display='none';}
  }

  if(text){
    var newMsg={id:'m'+Date.now(),from:'me',text:text,time:nowTime(),reactions:{},readBy:[],status:'sent',replyTo:replyingTo};
    /* Detect link */
    if(/https?:\/\/[^\s]+/.test(text)){newMsg.linkPreview={url:'https://earthlive.io',domain:'earthlive.io',title:'EarthLive — Real-Time Global Feed',emoji:'🌍'};}
    conv.messages.push(newMsg);
    if(ta){ta.value='';ta.style.height='auto';}
  }

  replyingTo=null;
  var rb=document.getElementById('reply-bar');if(rb){rb.style.display='none';rb.innerHTML='';}
  var sendBtn=document.getElementById('send-btn');if(sendBtn)sendBtn.disabled=true;

  var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
  scrollToBottom();
  renderInbox();

  /* Simulate delivery → read */
  var lastId=conv.messages[conv.messages.length-1].id;
  setTimeout(function(){var m=conv.messages.find(function(x){return x.id===lastId;});if(m)m.status='delivered';var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);scrollToBottom();},800);
  setTimeout(function(){var m=conv.messages.find(function(x){return x.id===lastId;});if(m){m.status='read';m.readBy=conv.participants.slice(0,1);}var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);scrollToBottom();},2000);

  /* Simulate reply */
  simulateReply(conv);
}

var partnerTypingTimer=null;
function simulatePartnerTyping(){
  if(!activeConvId)return;
  clearTimeout(partnerTypingTimer);
}
function simulateTyping(conv){
  /* Show typing indicator briefly when opening certain convos */
  if(!['c1','c3'].includes(conv.id))return;
  setTimeout(function(){
    if(activeConvId!==conv.id)return;
    typingTimers[conv.id]=true;
    var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
    scrollToBottom();
    /* Update conv preview */
    var cr=document.getElementById('cr-'+conv.id);if(cr){var prev=cr.querySelector('.conv-preview');if(prev)prev.outerHTML='<div class="conv-typing-preview"><div class="conv-typing-dots"><div class="typing-dot-sm"></div><div class="typing-dot-sm"></div><div class="typing-dot-sm"></div></div>typing…</div>';}
    setTimeout(function(){
      typingTimers[conv.id]=false;
      var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
      scrollToBottom();
      renderInbox();
    },2200);
  },1200);
}

var replyTimers={};
function simulateReply(conv){
  if(conv.isRequest||conv.type==='group')return;
  var p=getPerson(conv.participants[0]);
  var replies=[
    'That\'s a great point! 🌍','Totally agree with you on this.','Wow, hadn\'t thought about it that way!','Will check it out right now!','Sounds good, let\'s coordinate 📍','This is exactly what I was thinking.','On it! Will post soon 🔥','Haha yes!! 😂','Let\'s make it happen.','Amazing content as always ✨'
  ];
  clearTimeout(replyTimers[conv.id]);
  /* Show typing */
  setTimeout(function(){
    typingTimers[conv.id]=true;
    var body=document.getElementById('chat-body');if(body&&activeConvId===conv.id)body.innerHTML=buildMessages(conv);
    scrollToBottom();
    /* Then reply */
    replyTimers[conv.id]=setTimeout(function(){
      typingTimers[conv.id]=false;
      var reply=replies[Math.floor(Math.random()*replies.length)];
      var replyMsg={id:'m'+Date.now(),from:conv.participants[0],text:reply,time:nowTime(),reactions:{},readBy:['me'],status:'read'};
      conv.messages.push(replyMsg);
      if(activeConvId===conv.id){var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);scrollToBottom();}
      else{conv.unread=(conv.unread||0)+1;}
      renderInbox();
    },2000+Math.random()*1000);
  },800+Math.random()*600);
}

function nowTime(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
function scrollToBottom(){var b=document.getElementById('chat-body');if(b)b.scrollTop=b.scrollHeight;}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ══════════════
   REACTIONS
══════════════ */
function toggleReactionPicker(rpId,e){
  e.stopPropagation();
  document.querySelectorAll('.reaction-picker.show').forEach(function(rp){if(rp.id!==rpId)rp.classList.remove('show');});
  var rp=document.getElementById(rpId);if(rp)rp.classList.toggle('show');
}
document.addEventListener('click',function(){document.querySelectorAll('.reaction-picker.show').forEach(function(rp){rp.classList.remove('show');});});
function toggleReaction(convId,msgId,emoji){
  var conv=getConv(convId);if(!conv)return;
  var msg=conv.messages.find(function(m){return m.id===msgId;});if(!msg)return;
  if(!msg.reactions)msg.reactions={};
  if(!msg.reactions[emoji])msg.reactions[emoji]=[];
  var idx=msg.reactions[emoji].indexOf('me');
  if(idx>-1){msg.reactions[emoji].splice(idx,1);if(!msg.reactions[emoji].length)delete msg.reactions[emoji];}
  else{msg.reactions[emoji].push('me');}
  var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
  scrollToBottom();
  document.querySelectorAll('.reaction-picker').forEach(function(rp){rp.classList.remove('show');});
}

/* ══════════════
   REPLY / FORWARD / UNSEND
══════════════ */
function setReplyTo(convId,msgId){
  var conv=getConv(convId);if(!conv)return;
  var msg=conv.messages.find(function(m){return m.id===msgId;});if(!msg)return;
  replyingTo=msgId;
  var rb=document.getElementById('reply-bar');
  if(rb){
    rb.style.display='flex';
    rb.className='composer-reply-bar';
    rb.innerHTML='<span style="font-family:Space Mono,monospace;font-size:.38rem;color:var(--accent)">↩ Replying to '+(msg.from==='me'?'yourself':getPerson(msg.from).name)+'</span><span class="crb-text">'+fmtPreview(msg)+'</span><button class="crb-close" onclick="cancelReply()">✕</button>';
  }
  var ta=document.getElementById('msg-input');if(ta)ta.focus();
}
function cancelReply(){replyingTo=null;var rb=document.getElementById('reply-bar');if(rb){rb.style.display='none';rb.innerHTML='';}}
function unsendMsg(convId,msgId){
  var conv=getConv(convId);if(!conv)return;
  conv.messages=conv.messages.filter(function(m){return m.id!==msgId;});
  var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
  showToast('Message unsent');
}
function forwardMsg(convId,msgId){
  var conv=getConv(convId);var msg=conv&&conv.messages.find(function(m){return m.id===msgId;});if(!msg)return;
  showToast('Forward: choose a conversation');
}

/* ══════════════
   MEDIA
══════════════ */
function triggerMediaUpload(){document.getElementById('media-upload').click();}
function handleMediaUpload(input){
  if(!input.files)return;
  Array.from(input.files).forEach(function(f){
    var r=new FileReader();r.onload=function(e){
      composerMedia.push(e.target.result);
      var pb=document.getElementById('media-preview-bar');
      if(pb){pb.style.display='flex';pb.innerHTML=composerMedia.map(function(src,i){return'<div class="cmp-item"><img src="'+src+'"><button class="cmp-remove" onclick="removeMedia('+i+')">✕</button></div>';}).join('');}
      var sb=document.getElementById('send-btn');if(sb)sb.disabled=false;
    };r.readAsDataURL(f);
  });
  input.value='';
}
function removeMedia(i){composerMedia.splice(i,1);var pb=document.getElementById('media-preview-bar');if(pb){if(!composerMedia.length){pb.style.display='none';pb.innerHTML='';}else{pb.innerHTML=composerMedia.map(function(src,j){return'<div class="cmp-item"><img src="'+src+'"><button class="cmp-remove" onclick="removeMedia('+j+')">✕</button></div>';}).join('');}}var sb=document.getElementById('send-btn');if(sb)sb.disabled=!composerMedia.length&&!document.getElementById('msg-input').value.trim();}

function recordVoice(){
  /* Simulate voice message */
  var conv=getConv(activeConvId);if(!conv)return;
  var vm={id:'m'+Date.now(),from:'me',type:'voice',text:'',time:nowTime(),reactions:{},readBy:[],status:'sent'};
  conv.messages.push(vm);
  var body=document.getElementById('chat-body');if(body)body.innerHTML=buildMessages(conv);
  scrollToBottom();showToast('Voice message sent 🎤');
}

function openLightbox(src){
  var lb=document.createElement('div');lb.className='lightbox';
  lb.innerHTML='<button class="lightbox-close" onclick="this.parentNode.remove()">✕</button><img src="'+src+'">';
  lb.addEventListener('click',function(e){if(e.target===lb)lb.remove();});
  document.body.appendChild(lb);
}

/* ══════════════
   EMOJI PICKER
══════════════ */
var emojiPickerOpen=false,emojiCat='Smileys';
function toggleEmojiPicker(){
  emojiPickerOpen=!emojiPickerOpen;
  var ep=document.getElementById('emoji-picker');
  if(!emojiPickerOpen){ep.classList.remove('show');return;}
  renderEmojiPicker();ep.classList.add('show');
}
function renderEmojiPicker(){
  var ep=document.getElementById('emoji-picker');
  var cats=Object.keys(EMOJIS);
  ep.innerHTML='<div class="ep-cats">'+cats.map(function(c){return'<button class="ep-cat'+(c===emojiCat?' active':'')+'" onclick="emojiCat=\''+c+'\';renderEmojiPicker()">'+(c==='Smileys'?'😀':c==='People'?'👏':c==='Nature'?'🌸':'📎')+'</button>';}).join('')+'</div>'+
    '<div class="ep-grid">'+EMOJIS[emojiCat].map(function(e){return'<button class="ep-emoji" onclick="insertEmoji(\''+e+'\')">'+e+'</button>';}).join('')+'</div>';
}
function insertEmoji(e){var ta=document.getElementById('msg-input');if(ta){var pos=ta.selectionStart;ta.value=ta.value.slice(0,pos)+e+ta.value.slice(pos);ta.selectionStart=ta.selectionEnd=pos+e.length;ta.focus();var sb=document.getElementById('send-btn');if(sb)sb.disabled=false;}}
document.addEventListener('click',function(e){var ep=document.getElementById('emoji-picker');if(ep&&!ep.contains(e.target)&&!e.target.closest('.ct-btn')){ep.classList.remove('show');emojiPickerOpen=false;}});

/* ══════════════
   GROUP INFO PANEL
══════════════ */
function toggleGroupInfo(){
  groupInfoOpen=!groupInfoOpen;
  var gip=document.getElementById('group-info-panel');if(gip)gip.classList.toggle('open',groupInfoOpen);
  document.querySelectorAll('.cha-btn').forEach(function(b){if(b.title==='Group Info')b.classList.toggle('active',groupInfoOpen);});
}
function renameGroup(convId,newName){var conv=getConv(convId);if(conv)conv.name=newName;renderInbox();showToast('Group renamed ✓');}
function addMemberToGroup(){showToast('Add member — opens people search');}
function leaveGroup(convId){if(!confirm('Leave this group?'))return;CONVERSATIONS=CONVERSATIONS.filter(function(c){return c.id!==convId;});activeConvId=null;document.getElementById('chat-panel').innerHTML='<div class="chat-empty"><div class="chat-empty-icon">💬</div><div class="chat-empty-text">Messages</div></div>';renderInbox();showToast('Left group');}

/* ══════════════
   CONV OPTIONS
══════════════ */
function toggleMuteConv(id){var c=getConv(id);if(c){c.muted=!c.muted;openConversation(id);renderInbox();showToast(c.muted?'Conversation muted 🔇':'Conversation unmuted 🔊');}}
function togglePinConv(id){var c=getConv(id);if(c){c.pinned=!c.pinned;openConversation(id);renderInbox();showToast(c.pinned?'Pinned 📌':'Unpinned');}}
function showConvMenu(id){showToast('More options for conversation');}

/* ══════════════
   MESSAGE REQUESTS
══════════════ */
function acceptMsgRequest(convId){
  var c=getConv(convId);if(!c)return;
  c.isRequest=false;
  openConversation(convId);renderInbox();
  showToast('Request accepted — conversation started ✓');
}
function declineMsgRequest(convId){
  if(!confirm('Decline and delete this message request?'))return;
  CONVERSATIONS=CONVERSATIONS.filter(function(c){return c.id!==convId;});
  activeConvId=null;
  document.getElementById('chat-panel').innerHTML='<div class="chat-empty"><div class="chat-empty-icon">💬</div><div class="chat-empty-text">Messages</div><div class="chat-empty-sub">Select a conversation</div></div>';
  renderInbox();showToast('Request declined');
}

/* ══════════════
   NEW CHAT MODALS
══════════════ */
var ncSelected=[];var ncTab='dm';
function openNewChatModal(){ncSelected=[];ncTab='dm';openNewModal('New Message',false);}
function openNewGroupModal(){ncSelected=[];ncTab='group';openNewModal('New Group',true);}
function openNewModal(title,isGroup){
  var m=document.createElement('div');m.className='modal-overlay';m.id='new-chat-modal';
  var peopleList=Object.values(PEOPLE).map(function(p){
    return'<div class="nc-person" id="ncp-'+p.id+'" onclick="toggleNcSelect(\''+p.id+'\')">'+
      '<div class="nc-av">'+p.av+'</div>'+
      '<div style="flex:1"><div style="font-family:Space Mono,monospace;font-size:.5rem;color:var(--text)">'+p.name+'</div><div style="font-family:Space Mono,monospace;font-size:.38rem;color:var(--text4)">'+p.handle+(!p.isFollower?' · Not following you':'')+'</div></div>'+
      '<div class="nc-check" id="ncc-'+p.id+'"></div>'+
    '</div>';
  }).join('');
  m.innerHTML='<div class="modal-box"><div class="modal-bar"></div>'+
    '<div class="modal-header"><div class="modal-title">'+title+'</div><button class="modal-close" onclick="document.getElementById(\'new-chat-modal\').remove()">✕</button></div>'+
    '<div class="modal-body">'+
    '<div class="nc-tabs">'+
    '<button class="nctab'+(ncTab==='dm'?' active':'')+'" onclick="switchNcTab(\'dm\',this)">Direct Message</button>'+
    '<button class="nctab'+(ncTab==='group'?' active':'')+'" onclick="switchNcTab(\'group\',this)">Group Chat</button>'+
    '</div>'+
    '<div id="nc-group-name-wrap" style="display:'+(isGroup?'block':'none')+'"><input class="group-name-input" id="nc-group-name" placeholder="Group name…"></div>'+
    '<div id="selected-pills-wrap" class="selected-pills"></div>'+
    '<div class="nc-search"><span style="color:var(--text4);font-size:.75rem">⌕</span><input placeholder="Search people…" oninput="filterNcPeople(this.value)"></div>'+
    '<div id="nc-people-list">'+peopleList+'</div>'+
    '</div>'+
    '<div class="modal-footer"><button class="mf-btn mf-secondary" onclick="document.getElementById(\'new-chat-modal\').remove()">Cancel</button><button class="mf-btn mf-primary" id="nc-create-btn" onclick="createConversation()" disabled>'+( isGroup?'Create Group →':'Start Chat →')+'</button></div>'+
    '</div>';
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
  document.body.appendChild(m);
}
function switchNcTab(tab,btn){
  ncTab=tab;
  document.querySelectorAll('.nctab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');
  var gnw=document.getElementById('nc-group-name-wrap');if(gnw)gnw.style.display=tab==='group'?'block':'none';
  var cb=document.getElementById('nc-create-btn');if(cb)cb.textContent=tab==='group'?'Create Group →':'Start Chat →';
}
function toggleNcSelect(id){
  var idx=ncSelected.indexOf(id);
  if(ncTab==='dm'){if(idx>-1)ncSelected=[];else ncSelected=[id];}
  else{if(idx>-1)ncSelected.splice(idx,1);else ncSelected.push(id);}
  /* Update checkmarks */
  Object.keys(PEOPLE).forEach(function(pid){var el=document.getElementById('ncc-'+pid);var row=document.getElementById('ncp-'+pid);if(el){el.textContent=ncSelected.includes(pid)?'✓':'';row&&row.classList.toggle('selected',ncSelected.includes(pid));}});
  /* Pills */
  var pills=document.getElementById('selected-pills-wrap');
  if(pills)pills.innerHTML=ncSelected.map(function(pid){var p=PEOPLE[pid];return p?'<div class="sel-pill">'+p.av+' '+p.name.split(' ')[0]+'<button onclick="toggleNcSelect(\''+pid+'\')">✕</button></div>':''}).join('');
  var cb=document.getElementById('nc-create-btn');if(cb)cb.disabled=!ncSelected.length;
}
function filterNcPeople(q){
  Object.values(PEOPLE).forEach(function(p){
    var row=document.getElementById('ncp-'+p.id);if(!row)return;
    row.style.display=(!q||p.name.toLowerCase().includes(q.toLowerCase())||p.handle.toLowerCase().includes(q.toLowerCase()))?'flex':'none';
  });
}
function createConversation(){
  if(!ncSelected.length)return;
  var gname=document.getElementById('nc-group-name');var groupName=gname?gname.value.trim():'';
  var isGroup=ncTab==='group';
  if(isGroup&&!groupName){if(gname)gname.focus();showToast('Enter a group name');return;}
  /* Check if DM already exists */
  if(!isGroup){
    var existing=CONVERSATIONS.find(function(c){return c.type==='dm'&&c.participants[0]===ncSelected[0];});
    if(existing){document.getElementById('new-chat-modal').remove();openConversation(existing.id);return;}
  }
  var newConv={id:'c'+Date.now(),type:isGroup?'group':'dm',participants:ncSelected,name:isGroup?(groupName||'New Group'):null,unread:0,muted:false,pinned:false,isRequest:false,messages:[]};
  CONVERSATIONS.unshift(newConv);
  document.getElementById('new-chat-modal').remove();
  renderInbox();
  openConversation(newConv.id);
  showToast(isGroup?'Group created ✓':'Conversation started ✓');
}

/* ══════════════
   INIT
══════════════ */
renderInbox();
/* Auto-open first conversation */
setTimeout(function(){openConversation('c1');},100);

/* ── CURSOR ── */
var C=document.getElementById('C'),CR=document.getElementById('CR'),mx=0,my=0,lx=0,ly=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;C.style.transform='translate('+mx+'px,'+my+'px) translate(-50%,-50%)';});
(function loop(){lx+=(mx-lx)*.12;ly+=(my-ly)*.12;CR.style.transform='translate('+lx+'px,'+ly+'px) translate(-50%,-50%)';requestAnimationFrame(loop);})();
</script>
